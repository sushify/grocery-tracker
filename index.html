<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4a7a9b">
<title>Grocery Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #f5f3ef; font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; color: #1a1a1a; }
  #root { min-height: 100vh; }
  .loading { display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Source Serif 4', Georgia, serif; color: #999; }
</style>
</head>
<body>
<div id="root"><div class="loading">Loading Grocery Tracker...</div></div>

<!-- React 18 from CDN (these work fine) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>

<!-- Recharts bundled locally (CDN UMD builds are unreliable) -->
<script src="recharts.bundle.js"></script>

<!-- Google auth (async, not blocking) -->
<script src="https://accounts.google.com/gsi/client" async></script>

<!-- App -->
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
